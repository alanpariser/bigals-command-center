<style>
:root {
  --navy: #0a1628;
  --navy-mid: #122040;
  --navy-light: #1a2f55;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --gold-dim: #8a6f32;
  --white: #f0f4ff;
  --gray: #8898aa;
  --success: #2ecc71;
  --warning: #f39c12;
  --danger: #e74c3c;
  --info: #3498db;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--navy); color:var(--white); font-family:'Barlow',sans-serif; min-height:100vh; }

/* HEADER */
.header {
  background:linear-gradient(135deg,var(--navy-mid),var(--navy));
  border-bottom:2px solid var(--gold);
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.logo { font-family:'Bebas Neue',cursive; font-size:26px; color:var(--gold); letter-spacing:2px; }
.logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--gray); letter-spacing:3px; text-transform:uppercase; }
.header-right { display:flex; gap:12px; align-items:center; }
.btn-add-header {
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  color:var(--navy); border:none; border-radius:6px;
  padding:8px 18px; font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.btn-add-header:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(201,168,76,0.3); }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; padding:20px 24px 0; }
.stat {
  background:var(--navy-mid); border:1px solid var(--navy-light);
  border-radius:10px; padding:14px 16px;
  display:flex; align-items:center; gap:12px;
  transition:border-color 0.2s;
}
.stat:hover { border-color:var(--gold-dim); }
.stat-icon { font-size:24px; }
.stat-num { font-family:'Bebas Neue',cursive; font-size:28px; color:var(--gold); line-height:1; }
.stat-label { font-size:10px; color:var(--gray); text-transform:uppercase; letter-spacing:1px; }

/* CONTROLS */
.controls { padding:16px 24px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.filter-group { display:flex; gap:6px; flex-wrap:wrap; }
.fbtn {
  background:var(--navy-mid); border:1px solid var(--navy-light);
  color:var(--gray); padding:7px 14px; border-radius:6px;
  font-family:'Barlow Condensed',sans-serif; font-size:12px;
  font-weight:600; letter-spacing:0.5px; cursor:pointer;
  transition:all 0.2s; text-transform:uppercase;
}
.fbtn:hover, .fbtn.active { background:var(--gold); border-color:var(--gold); color:var(--navy); }
.search {
  flex:1; min-width:180px;
  background:var(--navy-mid); border:1px solid var(--navy-light);
  border-radius:8px; padding:8px 14px; color:var(--white);
  font-family:'Barlow',sans-serif; font-size:13px;
}
.search:focus { outline:none; border-color:var(--gold); }

/* TASK LIST */
.task-container { padding:0 24px 40px; }
.section-header {
  font-family:'Barlow Condensed',sans-serif; font-size:11px;
  font-weight:700; color:var(--gold); letter-spacing:2px;
  text-transform:uppercase; padding:16px 0 8px;
  border-bottom:1px solid var(--navy-light); margin-bottom:4px;
  display:flex; align-items:center; gap:8px;
}
.task-row {
  display:grid;
  grid-template-columns:28px 1fr 110px 100px 90px 110px 100px;
  align-items:center; gap:8px;
  padding:9px 12px; border-radius:8px;
  border:1px solid transparent;
  transition:all 0.15s; cursor:pointer;
  margin-bottom:2px;
}
.task-row:hover { background:rgba(255,255,255,0.03); border-color:var(--navy-light); }
.task-row.completed { opacity:0.45; }
.task-row.completed .task-name { text-decoration:line-through; color:var(--gray); }

/* Checkbox */
.cb-wrap { display:flex; align-items:center; justify-content:center; }
.cb {
  width:18px; height:18px; border-radius:4px;
  border:2px solid var(--navy-light); background:transparent;
  cursor:pointer; appearance:none; transition:all 0.2s;
  position:relative; flex-shrink:0;
}
.cb:checked { background:var(--success); border-color:var(--success); }
.cb:checked::after {
  content:'✓'; position:absolute; top:-1px; left:2px;
  font-size:13px; color:white; font-weight:bold;
}
.cb:hover { border-color:var(--gold); }

.task-name { font-size:13px; font-weight:500; color:var(--white); }
.task-notes { font-size:11px; color:var(--gray); margin-top:2px; }

/* Badges */
.badge {
  display:inline-block; padding:2px 8px; border-radius:20px;
  font-size:10px; font-weight:700;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.5px; text-transform:uppercase;
  white-space:nowrap;
}
.b-not-started { background:rgba(136,152,170,0.15); color:#8898aa; border:1px solid rgba(136,152,170,0.3); }
.b-in-progress { background:rgba(243,156,18,0.15); color:#f39c12; border:1px solid rgba(243,156,18,0.3); }
.b-complete { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }
.b-on-hold { background:rgba(52,152,219,0.15); color:#3498db; border:1px solid rgba(52,152,219,0.3); }
.b-critical { background:rgba(231,76,60,0.15); color:#e74c3c; border:1px solid rgba(231,76,60,0.3); }
.b-high { background:rgba(243,156,18,0.15); color:#f39c12; border:1px solid rgba(243,156,18,0.3); }
.b-medium { background:rgba(52,152,219,0.15); color:#3498db; border:1px solid rgba(52,152,219,0.3); }
.b-low { background:rgba(136,152,170,0.15); color:#8898aa; border:1px solid rgba(136,152,170,0.3); }
.b-bigals { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.b-melaleuca { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }
.b-family { background:rgba(155,89,182,0.15); color:#9b59b6; border:1px solid rgba(155,89,182,0.3); }

.due { font-size:11px; color:var(--gray); white-space:nowrap; }
.due-overdue { color:#e74c3c; font-weight:700; }
.due-today { color:#f39c12; font-weight:700; }
.due-soon { color:var(--gold); font-weight:600; }

.owner-badge { font-size:11px; color:var(--gray); }

/* MODAL */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); z-index:200;
  align-items:center; justify-content:center; padding:20px;
}
.overlay.active { display:flex; }
.modal {
  background:var(--navy-mid); border:1px solid var(--gold-dim);
  border-radius:16px; padding:28px; width:100%; max-width:500px;
  max-height:90vh; overflow-y:auto;
}
.modal h3 { font-family:'Bebas Neue',cursive; font-size:26px; color:var(--gold); letter-spacing:2px; margin-bottom:20px; }
.fg { margin-bottom:14px; }
.fg label { display:block; font-size:11px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.fg input, .fg select, .fg textarea {
  width:100%; background:rgba(255,255,255,0.05);
  border:1px solid var(--navy-light); border-radius:8px;
  padding:9px 12px; color:var(--white);
  font-family:'Barlow',sans-serif; font-size:13px;
}
.fg select option { background:var(--navy-mid); }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline:none; border-color:var(--gold); }
.fg textarea { resize:vertical; min-height:70px; }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.btn-cancel {
  flex:1; background:transparent; border:1px solid var(--navy-light);
  color:var(--gray); border-radius:8px; padding:11px;
  font-family:'Barlow Condensed',sans-serif; font-size:13px;
  font-weight:600; text-transform:uppercase; cursor:pointer;
}
.btn-cancel:hover { border-color:var(--gray); color:var(--white); }
.btn-save {
  flex:2; background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  color:var(--navy); border:none; border-radius:8px; padding:11px;
  font-family:'Barlow Condensed',sans-serif; font-size:14px;
  font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.btn-save:hover { transform:translateY(-1px); }

.col-header {
  display:grid;
  grid-template-columns:28px 1fr 110px 100px 90px 110px 100px;
  gap:8px; padding:6px 12px;
  font-family:'Barlow Condensed',sans-serif; font-size:10px;
  color:var(--gray); letter-spacing:1px; text-transform:uppercase;
  border-bottom:1px solid var(--navy-light); margin-bottom:6px;

.empty { text-align:center; padding:40px; color:var(--gray); font-size:14px; }

@media(max-width:900px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  .task-row { grid-template-columns:28px 1fr 90px 80px; }
  .task-row > *:nth-child(n+6) { display:none; }
  .col-header > *:nth-child(n+6) { display:none; }

      <div class="fg"><label>Priority</label>

    <div class="fg"><label>Notes</label><textarea id="fNotes" placeholder="Additional details..."></textarea></div>
    <div class="modal-btns">

  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let tasks = [];
let filters = { biz:'all', time:'all', status:'all' };
let editId = null;
let nextId = 46;

function load() {
  const saved = localStorage.getItem('bigals_tasks_v2');
  tasks = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
  nextId = tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 46;
}
function save() { localStorage.setItem('bigals_tasks_v2', JSON.stringify(tasks)); }

// ── FILTERS ───────────────────────────────────────────────────────────────────
function setFilter(type, val, btn) {
  filters[type] = val;
  const groupId = type==='biz'?'bizFilters':type==='time'?'timeFilters':'statusFilters';
  document.querySelectorAll(`#${groupId} .fbtn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
  const monthEnd = new Date(today); monthEnd.setDate(monthEnd.getDate()+30);
  const q = document.getElementById('searchBox')?.value.toLowerCase()||'';
  return tasks.filter(t => {
    if(filters.biz!=='all' && t.biz!==filters.biz) return false;
    if(filters.status!=='all' && t.status!==filters.status) return false;
    if(filters.time!=='all') {
      if(!t.due) return false;
      const d = new Date(t.due+'T00:00:00');
      if(filters.time==='overdue' && !(d<today && t.status!=='complete')) return false;
      if(filters.time==='today' && !(d.getTime()===today.getTime())) return false;
      if(filters.time==='tomorrow' && !(d.getTime()===tomorrow.getTime())) return false;
      if(filters.time==='week' && !(d>=today && d<=weekEnd)) return false;
      if(filters.time==='month' && !(d>=today && d<=monthEnd)) return false;
    }
    if(q && !t.name.toLowerCase().includes(q) && !t.notes.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => {
    if(!a.due && !b.due) return 0;
    if(!a.due) return 1;
    if(!b.due) return -1;
    return new Date(a.due) - new Date(b.due);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  renderTasks();
}

function renderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const total = tasks.length;
  const overdue = tasks.filter(t=>t.due&&new Date(t.due+'T00:00:00')<today&&t.status!=='complete').length;
  const inprog = tasks.filter(t=>t.status==='in-progress').length;
  const complete = tasks.filter(t=>t.status==='complete').length;
  const critical = tasks.filter(t=>t.priority==='critical'&&t.status!=='complete').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-icon">📋</div><div><div class="stat-num">${total}</div><div class="stat-label">Total Tasks</div></div></div>
    <div class="stat"><div class="stat-icon">🔥</div><div><div class="stat-num" style="color:#e74c3c">${overdue}</div><div class="stat-label">Overdue</div></div></div>
    <div class="stat"><div class="stat-icon">⚡</div><div><div class="stat-num" style="color:#f39c12">${inprog}</div><div class="stat-label">In Progress</div></div></div>
    <div class="stat"><div class="stat-icon">✅</div><div><div class="stat-num" style="color:#2ecc71">${complete}</div><div class="stat-label">Complete</div></div></div>
    <div class="stat"><div class="stat-icon">🚨</div><div><div class="stat-num" style="color:#e74c3c">${critical}</div><div class="stat-label">Critical</div></div></div>
  `;
}

function renderTasks() {
  const filtered = getFiltered();
  const container = document.getElementById('taskContainer');
  if(!filtered.length) { container.innerHTML='<div class="empty">No tasks found.</div>'; return; }

  // Group by business
  const groups = {};
  filtered.forEach(t => {
    const g = t.biz==='melaleuca'?'🌿 Melaleuca':t.biz==='family'?'👨‍👩‍👧 Family':"🏖️ Big Al's Barefoot Bay";
    if(!groups[g]) groups[g]=[];
    groups[g].push(t);
  });

  let html = `<div class="col-header">
    <div></div><div>Task</div><div>Status</div><div>Priority</div>
    <div>Owner</div><div>Due Date</div><div>Business</div>
  </div>`;

  for(const [group, gtasks] of Object.entries(groups)) {
    html += `<div class="section-header">${group} <span style="color:var(--gray);font-size:10px">(${gtasks.length})</span></div>`;
    gtasks.forEach(t => {
      const due = formatDue(t.due);
      const statusBadge = `<span class="badge b-${t.status}">${t.status.replace('-',' ')}</span>`;
      const priorityBadge = `<span class="badge b-${t.priority}">${t.priority}</span>`;
      const bizBadge = `<span class="badge b-${t.biz}">${t.biz==='bigals'?"Big Al's":t.biz==='melaleuca'?'Melaleuca':'Family'}</span>`;
      html += `<div class="task-row ${t.status==='complete'?'completed':''}" data-id="${t.id}">
        <div class="cb-wrap"><input type="checkbox" class="cb" ${t.status==='complete'?'checked':''} onchange="toggleDone(${t.id},this)" onclick="event.stopPropagation()"></div>
        <div>
          <div class="task-name">${t.name}</div>
          ${t.notes?`<div class="task-notes">${t.notes.substring(0,80)}${t.notes.length>80?'...':''}</div>`:''}
        </div>
        <div>${statusBadge}</div>
        <div>${priorityBadge}</div>
        <div class="owner-badge">${t.owner}</div>
        <div>${due}</div>
        <div>${bizBadge}</div>
      </div>`;
    });
  }
  container.innerHTML = html;

  // Click row to edit
  document.querySelectorAll('.task-row').forEach(row => {
    row.addEventListener('click', e => {
      if(e.target.classList.contains('cb')) return;
      openModal(parseInt(row.dataset.id));
    });
  });
}

function formatDue(due) {
  if(!due) return '<span class="due">—</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due+'T00:00:00');
  const diff = Math.floor((d-today)/86400000);
  const label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(diff<0) return `<span class="due due-overdue">⚠ ${label}</span>`;
  if(diff===0) return `<span class="due due-today">TODAY</span>`;
  if(diff<=7) return `<span class="due due-soon">${label}</span>`;
  return `<span class="due">${label}</span>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleDone(id, cb) {
  const t = tasks.find(t=>t.id===id);
  if(!t) return;
  t.status = cb.checked ? 'complete' : 'not-started';
  t.done = cb.checked;
  save(); render();
}

function openModal(id=null) {
  editId = id;
  const modal = document.getElementById('overlay');
  document.getElementById('modalTitle').textContent = id ? '✏️ Edit Task' : '➕ New Task';
  if(id) {
    const t = tasks.find(t=>t.id===id);
    if(!t) return;
    document.getElementById('fName').value = t.name;
    document.getElementById('fBiz').value = t.biz;
    document.getElementById('fOwner').value = t.owner;
    document.getElementById('fPriority').value = t.priority;
    document.getElementById('fStatus').value = t.status;
    document.getElementById('fDue').value = t.due||'';
    document.getElementById('fNotes').value = t.notes||'';
  } else {
    document.getElementById('fName').value='';
    document.getElementById('fBiz').value='bigals';
    document.getElementById('fOwner').value='Big Al';
    document.getElementById('fPriority').value='medium';
    document.getElementById('fStatus').value='not-started';
    document.getElementById('fDue').value='';
    document.getElementById('fNotes').value='';
  }
  modal.classList.add('active');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}

function closeModal() { document.getElementById('overlay').classList.remove('active'); editId=null; }

function saveTask() {
  const name = document.getElementById('fName').value.trim();
  if(!name) { alert('Task name is required'); return; }
  if(editId) {
    const t = tasks.find(t=>t.id===editId);
    if(t) {
      t.name=name; t.biz=document.getElementById('fBiz').value;
      t.owner=document.getElementById('fOwner').value;
      t.priority=document.getElementById('fPriority').value;
      t.status=document.getElementById('fStatus').value;
      t.due=document.getElementById('fDue').value;
      t.notes=document.getElementById('fNotes').value.trim();
      t.done=t.status==='complete';
    }
  } else {
    tasks.push({
      id:nextId++,
      name, biz:document.getElementById('fBiz').value,
      owner:document.getElementById('fOwner').value,
      priority:document.getElementById('fPriority').value,
      status:document.getElementById('fStatus').value,
      due:document.getElementById('fDue').value,
      notes:document.getElementById('fNotes').value.trim(),
      done:false
    });
  }
  save(); closeModal(); render();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closeModal();
  if(e.ctrlKey && e.key==='n') { e.preventDefault(); openModal(); }
});
document.getElementById('overlay').addEventListener('click', e => {
  if(e.target===document.getElementById('overlay')) closeModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
load(); render();
</script>
</body>
</html>
